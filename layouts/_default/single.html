{{ define "main" }}
<style>
.book-wrap {
  max-width: 1000px;
  margin: 40px auto;
  padding: 0 20px;
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 40px;
}
.book-cover img {
  width: 100%;
  border-radius: 8px;
}
.buy-btn {
  display: inline-block;
  background: #28a745;
  color: white;
  padding: 14px 30px;
  border-radius: 6px;
  text-decoration: none;
  font-weight: bold;
  margin: 20px 0;
  font-size: 18px;
}
.preview-link {
  display: inline-block;
  color: #0066cc;
  text-decoration: underline;
  font-size: 16px;
}
.meta-line {
  color: #666;
  margin: 8px 0;
}
h1 {
  margin-top: 0;
}
</style>
<div class="book-wrap">
  <div class="book-cover">
    <img src="{{ .Params.cover }}" alt="{{ .Title }}">
  </div>
  <div class="book-info">
    <h1>{{ .Title }}</h1>
    <p class="meta-line">Category: {{ delimit .Params.categories ", " }}</p>
    <p class="meta-line">Tags: {{ delimit .Params.tags ", " }}</p>
    <p class="meta-line">Word Count: {{ .Params.wordcount }}</p>
    <p class="meta-line">Format: {{ .Params.format }}</p>

    <h3>Book Description</h3>
    <div class="desc">
      {{ .Content }}
    </div>

    <!-- Payhip购买弹窗按钮 -->
    <script src="https://payhip.com/payhip.js"></script>
    <a href="{{ .Params.payhip_url }}" class="payhip-buy-button buy-btn" data-theme="green">Buy Full PDF Ebook</a>
    <br>
    <a href="{{ .Params.preview_url }}" target="_blank" class="preview-link">Read Free Chapter Preview</a>
  </div>
</div>
{{ end }}
