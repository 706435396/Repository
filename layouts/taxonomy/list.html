{{ define "main" }}
<style>
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}
.book-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 28px;
  margin: 40px 0;
}
.book-card {
  text-align: center;
}
.book-card img {
  width: 100%;
  border-radius: 8px;
  box-shadow: 0 2px 10px #ddd;
}
h2 {
  margin-top: 40px;
}
</style>
<div class="container">
  <h2>Category: {{ .Title }}</h2>
  <div class="book-grid">
    {{ range .Pages }}
    <div class="book-card">
      <a href="{{ .RelPermalink }}">
        <img src="{{ .Params.cover }}" alt="{{ .Title }}">
        <p>{{ .Title }}</p>
      </a>
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
