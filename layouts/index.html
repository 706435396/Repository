{{ define "main" }}
<style>
/* 全局页面基础重置 */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background-color: #f5f5f5;
  font-family: system-ui, -apple-system, sans-serif;
}
/* 顶部横幅头部美化 */
header {
  background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
  padding: 70px 20px 90px;
  text-align: center;
}
header h1 {
  font-size: 64px;
  color: #cccccc;
  font-weight: 300;
}
header .sub-title {
  color: #aaaaaa;
  font-size: 20px;
  font-weight: normal;
  margin-top: 14px;
}
/* 导航栏hover交互 */
header nav {
  position: absolute;
  top: 22px;
  right: 24px;
}
header nav a {
  color: #fff;
  text-decoration: none;
  padding: 7px 12px;
  border-radius: 5px;
  margin: 0 4px;
  transition: background-color 0.25s ease;
}
header nav a:hover {
  background-color: #334155;
}
/* 内容主体容器 */
main {
  padding: 60px 0;
}
.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px;
}
h2 {
  margin-bottom: 40px;
  font-size: 26px;
  color: #1a1a1a;
}
/* 书籍网格布局 */
.book-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 48px;
  width: 100%;
}
.book-card {
  width: 100%;
  max-width: 180px;
  text-align: center;
  margin: 0 auto;
}
/* 自动文字封面样式优化 */
.book-cover {
  width: 100%;
  height: 270px;
  border-radius: 10px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.14);
  transition: transform 0.25s ease;
  object-fit: cover;
  background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
  box-sizing: border-box;
  color: #ffffff;
  text-align: center;
  font-weight: 600;
  font-size: 16px;
  line-height: 1.45;
  word-break: break-word;
  text-wrap: balance;
}
.book-card a:hover .book-cover {
  transform: translateY(-8px);
}
.book-card p {
  margin-top: 14px;
  font-weight: 500;
  color: #111;
  font-size: 15px;
}
/* 移动端手机适配 */
@media (max-width:768px) {
  header h1 {
    font-size: 40px;
  }
  header nav {
    position: static;
    margin-top: 20px;
  }
  main {
    padding: 40px 0;
  }
  .container {
    padding: 0 16px;
  }
  .book-grid {
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 30px;
  }
  .book-cover {
    height: 210px;
  }
}
</style>
<div class="container">
  <h2>New Released Novels</h2>
  <div class="book-grid">
    {{ $allBooks := sort (where .Site.RegularPages "Section" "books") "Date" "desc" }}
    {{ range $allBooks }}
    <div class="book-card">
      <a href="{{ .RelPermalink }}">
        {{ if .Params.cover }}
          <img 
            src="{{ .Params.cover }}" 
            alt="{{ .Title }} Book Cover" 
            class="book-cover"
            loading="lazy"
            onerror="this.onerror=null; this.outerHTML='<div class=&quot;book-cover&quot;>{{ .Title }}</div>'"
          >
        {{ else }}
          <div class="book-cover">{{ .Title }}</div>
        {{ end }}
        <p>{{ .Title }}</p>
      </a>
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
