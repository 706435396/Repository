{{ define "main" }}
<style>
/* 书籍网格样式 */
.book-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 28px;
  margin: 40px 0;
}
.book-card {
  text-align: center;
}
.book-card img {
  width: 100%;
  border-radius: 8px;
  box-shadow: 0 2px 10px #ddd;
  transition: 0.2s;
}
.book-card img:hover {
  transform: translateY(-4px);
}
.book-card p {
  margin-top: 10px;
  font-weight: 500;
}
h2 {
  margin-top: 50px;
  border-bottom: 1px solid #eee;
  padding-bottom: 10px;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}
</style>
<div class="container">
  <h2>New Released Novels</h2>
  <div class="book-grid">
    {{/* 修正sort语法，先过滤再排序 */}}
    {{ $allBooks := sort (where .Site.RegularPages "Section" "books") "Date" "desc" }}
    {{ range $allBooks }}
    <div class="book-card">
      <a href="{{ .RelPermalink }}">
        <img src="{{ .Params.cover }}" alt="{{ .Title }} Book Cover">
        <p>{{ .Title }}</p>
      </a>
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
