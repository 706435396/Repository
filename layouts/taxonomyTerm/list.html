<div class="container">
  <h2>Category: {{ .Title }}</h2>
  {{ if eq (len .Pages) 0 }}
    <p style="text-align:center; font-size:20px; color:#555; padding:60px 0;">No novels available in this category yet, check back later!</p>
  {{ else }}
    <div class="book-grid">
      {{ range .Pages }}
      <div class="book-card">
        <a href="{{ .RelPermalink }}">
          {{ if .Params.cover }}
            <img 
              src="{{ .Params.cover }}" 
              alt="{{ .Title }} Book Cover" 
              class="book-cover"
              loading="lazy"
              onerror="this.onerror=null; this.outerHTML='<div class=&quot;book-cover&quot;>{{ .Title }}</div>'"
            >
          {{ else }}
            <div class="book-cover">{{ .Title }}</div>
          {{ end }}
          <p>{{ .Title }}</p>
        </a>
      </div>
      {{ end }}
    </div>
  {{ end }}
</div>
